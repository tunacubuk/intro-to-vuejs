<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue.js Denemesi</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <h1> İsim: {{name}}</h1>
        <p> Yaş: {{age}}</p>
        <p> Meslek: {{job}}</p>
        <p>Website: <a v-bind:href="website">Vue.js</a></p>
        <input type="text" v-bind:value="name">
    </div>

    <script src="app.js"></script>
</body>

</html>
